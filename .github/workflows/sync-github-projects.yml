name: Sync GitHub project data

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-project-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub projects
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECT_SYNC_TOKEN || github.token }}
        run: npm run sync:projects

      - name: Show working tree changes
        run: git status --short

      - name: Commit generated project data
        run: |
          if git diff --quiet -- src/data/generated/projects.generated.json; then
            echo "No synchronized project data to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/projects.generated.json
          git commit -m "chore: sync GitHub project data"
          git push
